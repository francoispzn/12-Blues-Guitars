<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="50%" style="stop-color:#1e40af"/>
      <stop offset="100%" style="stop-color:#1e3a5f"/>
    </linearGradient>
    <linearGradient id="body-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Guitar body -->
  <g transform="translate(32,34)">
    <!-- Lower bout -->
    <ellipse cx="0" cy="6" rx="13" ry="15" fill="none" stroke="url(#body-grad)" stroke-width="2.8"/>
    <!-- Upper bout -->
    <ellipse cx="0" cy="-5" rx="9" ry="11" fill="none" stroke="url(#body-grad)" stroke-width="2.8"/>
    <!-- Sound hole -->
    <circle cx="0" cy="8" r="4.5" fill="none" stroke="#fbbf24" stroke-width="1.8"/>
    <!-- Neck -->
    <rect x="-3" y="-26" width="6" height="16" rx="1" fill="none" stroke="#60a5fa" stroke-width="2.2"/>
    <!-- Strings -->
    <line x1="-1.5" y1="-26" x2="-1.5" y2="18" stroke="#fbbf24" stroke-width="0.7" opacity="0.85"/>
    <line x1="0" y1="-26" x2="0" y2="18" stroke="#fbbf24" stroke-width="0.7" opacity="0.85"/>
    <line x1="1.5" y1="-26" x2="1.5" y2="18" stroke="#fbbf24" stroke-width="0.7" opacity="0.85"/>
    <!-- Headstock -->
    <rect x="-5" y="-30" width="10" height="5" rx="2" fill="#3b82f6"/>
    <!-- Tuning pegs -->
    <circle cx="-3.5" cy="-29" r="1" fill="#fbbf24"/>
    <circle cx="0" cy="-29" r="1" fill="#fbbf24"/>
    <circle cx="3.5" cy="-29" r="1" fill="#fbbf24"/>
    <!-- Bridge -->
    <rect x="-5" y="16" width="10" height="1.5" rx="0.5" fill="#fbbf24" opacity="0.7"/>
  </g>
</svg>
